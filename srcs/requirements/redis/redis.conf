# Redis Configuration - Secure

# Porta padrão
port 6379

# Bind apenas na rede Docker (não expor)
bind 0.0.0.0
protected-mode yes

# Timeout de conexão inativa (em segundos)
timeout 0

# TCP keepalive
tcp-keepalive 300

# Modo daemon (não usar em Docker)
daemonize no

# Nível de log
loglevel notice

# Arquivo de log
logfile ""

# Número de databases
databases 16

# Snapshot RDB (desabilitar para produção ou usar com cuidado)
save ""

# Compressão RDB
rdbcompression yes

# Checksum RDB
rdbchecksum yes

# Arquivo RDB
dbfilename dump.rdb

# Diretório de trabalho
dir /data

# Replicação (desabilitada)
replica-read-only yes

# ACL Log
acllog-max-len 128

# Máximo de clientes conectados
maxclients 10000

# Política de memória
maxmemory 256mb
maxmemory-policy allkeys-lru

# Append Only File (AOF) - para persistência
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# Proteção contra reescrita durante AOF
no-appendfsync-on-rewrite no

# Configuração de AOF
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Lua script
lua-time-limit 5000

# Slowlog
slowlog-log-slower-than 10000
slowlog-max-len 128

# Latency monitoring
latency-monitor-threshold 0

# Notificações de eventos (Redis 2.8.0+)
notify-keyspace-events ""

# Hash table
hash-max-listpack-entries 512
hash-max-listpack-value 64

# List
list-max-listpack-size -2
list-compress-depth 0

# Set
set-max-intset-entries 512

# Sorted set
zset-max-listpack-entries 128
zset-max-listpack-value 64

# HyperLogLog
hll-sparse-max-bytes 3000

# Streams
stream-node-max-bytes 4096
stream-node-max-entries 100

# Active rehashing
activerehashing yes

# Client output buffer limit
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Frequency of rehashing the main dict
hz 10

# Defragmentation
activedefrag no

# Min and max percentage of fragmentation
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10

# Max percentage of fragmentation
active-defrag-threshold-upper 100